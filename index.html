<!DOCTYPE html>
<html>

<head>
  <title>Anime AI Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #0b0f19;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #111827;
      border-bottom: 2px solid cyan;
    }

    .logo {
      color: cyan;
      font-size: 28px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 50px;
      color: cyan;
    }

    .search-box {
      margin-top: 25px;
    }

    input {
      width: 60%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid cyan;
      background: #111827;
      color: white;
      outline: none;
      font-size: 16px;
    }

    .featured {
      display: flex;
      gap: 30px;
      padding: 40px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .featured img {
      width: 280px;
      border-radius: 15px;
      box-shadow: 0 0 20px cyan;
    }

    .info {
      max-width: 500px;
    }

    .info h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .info p {
      color: #cbd5e1;
      line-height: 1.5;
    }

    .tag {
      margin-top: 10px;
      color: cyan;
    }

    .error {
      color: #ff4d4d;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Anime AI Hub</div>
  </nav>

  <div class="hero">
    <h1>Search Anime Instantly ⚔️</h1>

    <div class="search-box">
      <input id="search" placeholder="Try: Bleach, Naruto, Demon Slayer" onkeydown="handleEnter(event)">
    </div>
  </div>

  <div class="featured">

    <img id="img" src="https://wallpapercave.com/wp/wp9424537.jpg">

    <div class="info">

      <h2 id="title">Bleach TYBW</h2>

      <div class="tag">Action • Shounen • Fantasy</div>

      <p id="desc">
        Ichigo Kurosaki returns to battle the Quincy army in the Thousand-Year Blood War.
      </p>

    </div>
  </div>

  <script>
    function handleEnter(event) {
      if (event.key === "Enter") {
        searchAnime();
      }
    }

    function searchAnime() {

      let input = document.getElementById("search").value.toLowerCase();

      let title = document.getElementById("title");
      let desc = document.getElementById("desc");
      let img = document.getElementById("img");

      if (input.includes("bleach")) {

        title.innerText = "Bleach TYBW";
        desc.innerText = "Ichigo fights in the Thousand-Year Blood War against the Quincy.";
        img.src = "https://wallpapercave.com/wp/wp9424537.jpg";

      } else if (input.includes("demon")) {

        title.innerText = "Demon Slayer";
        desc.innerText = "Tanjiro fights demons to save Nezuko and humanity.";
        img.src = "https://wallpapercave.com/wp/wp8387587.jpg";

      } else if (input.includes("blue")) {

        title.innerText = "Blue Lock";
        desc.innerText = "A football survival project to create the ultimate striker.";
        img.src = "https://wallpapercave.com/wp/wp12304044.jpg";

      } else {

        title.innerText = "No Anime Found";
        desc.innerText = "Try searching Bleach, Demon Slayer, or Blue Lock.";
        img.src = "https://wallpapercave.com/wp/wp9101480.jpg";

      }
    }
  </script>

</body>

</html>
